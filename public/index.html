<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS TERMINAL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Start screen ──────────────────────────────────────────────────── -->
  <div id="start-screen">
    <div id="start-card">
      <div class="tile-grid">

        <div class="cfg-tile tile-difficulty">
          <div class="tile-label">DIFFICULTY</div>
          <select id="cfg-difficulty">
            <option value="NORMAL" selected>NORMAL</option>
            <option value="EASY">EASY</option>
            <option value="HARD">HARD</option>
          </select>
        </div>

        <div class="center-tile">
          <div class="brand">EMS TERMINAL</div>
          <div class="brand-sub">Clinical Decision Training for EMS Providers</div>
        </div>

        <div class="cfg-tile tile-provider">
          <div class="tile-label">PROVIDER</div>
          <select id="cfg-provider">
            <option value="ALS" selected>ALS — Paramedic</option>
            <option value="BLS">BLS — EMT</option>
          </select>
        </div>

        <div class="cfg-tile tile-region">
          <div class="tile-label">REGION</div>
          <select id="cfg-region">
            <option value="SUBURBAN" selected>Suburban</option>
            <option value="URBAN">Urban</option>
            <option value="RURAL">Rural</option>
            <option value="WILDERNESS">Wilderness</option>
          </select>
        </div>

        <div class="start-tile">
          <button id="start-btn">BEGIN SCENARIO</button>
        </div>

        <div class="access-tile">
          <div class="tile-label">BETA ACCESS</div>
          <div class="access-row">
            <input id="access-code" type="text" placeholder="access code" autocomplete="off" spellcheck="false">
            <button id="access-apply">APPLY</button>
          </div>
          <div id="tier-msg"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Terminal ──────────────────────────────────────────────────────── -->
  <div id="terminal">
    <div id="header">
      <span id="hdr-title">EMS TERMINAL</span>
      <span id="hdr-badges">
        <span class="badge" id="badge-tier">FREE</span>
        <span class="badge" id="badge-diff">NORMAL</span>
        <span class="badge" id="badge-prov">ALS</span>
        <span class="badge" id="badge-rgn">SUBURBAN</span>
      </span>
      <button id="end-btn" title="End current scenario">END SCENARIO</button>
    </div>

    <div id="output" role="log" aria-live="polite" aria-label="Scenario output"></div>

    <div id="input-row">
      <span class="prompt">&gt;&nbsp;</span>
      <input
        id="user-input"
        type="text"
        autocomplete="off"
        spellcheck="false"
        placeholder="Type your action or order..."
        aria-label="Your action"
      >
      <button id="send-btn">SEND</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
