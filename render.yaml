services:
  - type: web
    name: ems-sim
    runtime: node
    buildCommand: npm install --include=dev
    startCommand: node bin/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BETA_TOKENS
        sync: false
